<main>
    <section>
        <h2>Napiš nám</h2>
        <p>
            Máš dotaz, návrh na vylepšení nebo se chceš podělit o svůj nejlepší gól?  
            Vyplň formulář a ozveme se ti zpět.
        </p>

        <form action="#" method="post">
            <p>
                <label for="jmeno">Jméno:</label>
                <input type="text" id="jmeno" name="jmeno" required>
            </p>

            <p>
                <label for="email">E‑mail:</label>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="rank">Tvůj rank:</label>
                <select id="rank" name="rank">
                    <option>Bronze</option>
                    <option>Silver</option>
                    <option>Gold</option>
                    <option>Platinum</option>
                    <option>Diamond</option>
                    <option>Champion</option>
                    <option>Grand Champion</option>
                    <option>Super Sonic Legend</option>
                </select>
            </p>

            <p>
                <span>Preferovaný mód:</span><br>
                <label><input type="radio" name="mod" value="1v1"> 1v1</label>
                <label><input type="radio" name="mod" value="2v2"> 2v2</label>
                <label><input type="radio" name="mod" value="3v3"> 3v3</label>
                <label><input type="radio" name="mod" value="4v4"> 4v4</label>
            </p>
			
			<p>
            <label for="replay">Nahraj svůj replay (.replay):</label>
            <input type="file" id="replay" name="replay" accept=".replay">
            </p>

            <p>
                <label><input type="checkbox" id="novinky" name="novinky"> Chci dostávat novinky</label>
            </p>

            <p>
                <button type="submit">Odeslat</button>
            </p>
        </form>
    </section>
</main>
